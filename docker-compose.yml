version: '3.9'

services:
  db:
    image: postgres:16
    container_name: jitterbit-orders-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-senha}
      POSTGRES_DB: ${DB_NAME:-orders}
    ports:
      - '5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-orders}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    image: node:20
    container_name: jitterbit-orders-api
    working_dir: /usr/src/app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      PORT: ${PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-senha}
      DB_NAME: ${DB_NAME:-orders}
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    volumes:
      - .:/usr/src/app
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
